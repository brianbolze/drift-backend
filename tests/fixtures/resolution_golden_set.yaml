# Golden-set regression fixtures for the entity resolver.
#
# Each entry labels an LLM-style extracted entity dict against the entity_id
# we expect it to resolve to in data/drift.db. The test harness runs the
# resolver against production SQLite and asserts per-tier accuracy meets the
# captured baseline (see tests/test_resolution_golden_set.py).
#
# ## Why this file exists
#
# Steps 1–3 of the entity resolution refactor retuned the resolver's tiers
# (rapidfuzz replacing Jaccard, a new product_line_alias tier, stricter
# normalization). Every tier's confidence distribution shifted as a result.
# Without a regression net, a future tuning pass has no way to tell whether
# it traded away matches we already get right. This fixture locks the
# current behavior.
#
# ## Tier conventions
#
# - easy:   deterministic match expected (exact_sku or product_line_alias
#           with weight). Any regression here is a severe bug.
# - medium: composite_key or product_line tier expected. The resolver has
#           to combine weight + name evidence. Regression here usually
#           means a threshold tuned too strictly.
# - hard:   fuzzy_name tier expected, OR an "ambiguous" case where the
#           right answer is "flag don't match" (expected_entity_id: null).
#           Regression here can be acceptable depending on direction.
#
# ## Maintenance
#
# When drift.db entities are added, deleted, or renamed by curation patches,
# entries here may start failing. The test harness reports missing entity_ids
# explicitly so the fixture can be updated alongside the DB change. When
# real extractions from data/pipeline/extracted/ become available, they
# should be appended under each section to supplement the hand-crafted
# entries below (which were modeled on realistic LLM output patterns).
#
# ## Entry schema
#
# - entity_type: bullet | cartridge
# - tier: easy | medium | hard
# - category: subtype tag (e.g. exact_sku, composite_key, pl_alias)
# - description: human-readable label
# - extraction: dict passed to EntityResolver.resolve() — fields wrapped in
#   {value: ..., confidence: ...} ExtractedValue format
# - expected_entity_id: UUID in data/drift.db, or null for "should not match"

