patch:
  id: 020_barnes_mv_fill
  author: agent
  date: '2026-03-19'
  description: >
    Populate muzzle velocity for 33 Barnes VOR-TX cartridges. Barnes product pages
    publish BC but not MV. Data sourced from retailer sites (CheaperThanDirt,
    MidwayUSA, Natchez, SMGA, BlackBasin) and Barnes ballistics pages. All values
    cross-referenced against multiple sources. Barrel lengths use SAAMI standards
    where not explicitly stated by source (24" rifle, 26" magnum, 16" .300 BLK).
operations:

# ── .243 Winchester ──────────────────────────────────────────────────────────
# Source: multiple retailers — 3350 fps
- action: update_cartridge
  manufacturer: "Barnes Bullets"
  name: "VOR-TX Rifle TTSX 243 Win 80 GR BT"
  set:
    muzzle_velocity_fps: 3350
    test_barrel_length_inches: 24

# ── .270 WSM ─────────────────────────────────────────────────────────────────
# Source: CheaperThanDirt — 3135 fps
