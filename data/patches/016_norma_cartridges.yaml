patch:
  id: 016_norma_cartridges
  author: agent
  date: '2026-03-19'
  description: >
    Add Norma factory rifle cartridges. Norma's website is a 2.3MB SPA that the
    pipeline reducer cannot handle, so these are curated from retailer data
    (normausa.com, midwayusa.com, ammoseek.com). Covers Golden Target (match),
    BondStrike (LR hunting), TipStrike (hunting), and Ecostrike (lead-free).
    Whitetail line skipped — all bullets missing, low BC, not precision-relevant.
operations:

