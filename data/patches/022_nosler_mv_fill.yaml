# ── NOT INCLUDED: 300 Weatherby Mag 180gr Partition NoslerCustom ─────────────
# No verified factory MV found. Nosler NoslerCustom pages don't publish specs.
# Federal's equivalent .300 Wby 180gr Partition runs 3190 fps but different product.
# Left at zero rather than guess.
