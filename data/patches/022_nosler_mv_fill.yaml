# ── .300 Win Mag ─────────────────────────────────────────────────────────────
# Source: opticsplanet.com, ammunitiondepot.com — 2870 fps
- action: update_cartridge
  manufacturer: Nosler
  name: "300 Win Mag 190gr AccuBond Long Range Trophy Grade Ammunition"
