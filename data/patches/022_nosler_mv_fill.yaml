patch:
  id: 022_nosler_mv_fill
  author: agent
  date: '2026-03-19'
  description: >
    Populate muzzle velocity for 12 of 13 Nosler cartridges. Data sourced from
    retailer sites (BlackBasin, LuckyGunner, OpticsPlane, MidwayUSA, etc.) and
    Nosler product pages where available. Factory Seconds have identical specs
    to standard production. One cartridge (300 Wby Mag 180gr Partition) left at
    zero — no verified factory MV found from any source.
    Note: 222 Rem 50gr is the Ballistic Tip SP variant, MV from Hendershot's
    custom loader listing (3100 fps for Nosler 50gr .222 Rem loads).
operations:

# ── .22-250 Remington ────────────────────────────────────────────────────────
# Source: munitionsexpress.com, blackbasin.com — 3550 fps
- action: update_cartridge
  manufacturer: Nosler
  name: "22-250 Remington 55gr Ballistic Tip Varmint Ammunition (Factory Seconds) | 20 Count"
  set:
    muzzle_velocity_fps: 3550
    test_barrel_length_inches: 24

# ── .222 Remington ───────────────────────────────────────────────────────────
# Source: hendershots.net — 3100 fps for Nosler 50gr .222 Rem
- action: update_cartridge
  manufacturer: Nosler
  name: "222 Remington 50gr Ballistic Tip SP Ammunition"
  set:
    muzzle_velocity_fps: 3100
    test_barrel_length_inches: 24

# ── .223 Remington ───────────────────────────────────────────────────────────
# Source: blackbasin.com — 3100 fps
- action: update_cartridge
  manufacturer: Nosler
  name: "223 Remington 55gr Soft Point NoslerCustom Ammunition"
  set:
    muzzle_velocity_fps: 3100
    test_barrel_length_inches: 24

# ── .243 Winchester ──────────────────────────────────────────────────────────
# Source: luckygunner.com — 3100 fps
