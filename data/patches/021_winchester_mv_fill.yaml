patch:
  id: 021_winchester_mv_fill
  author: agent
  date: '2026-03-19'
  description: >
    Populate muzzle velocity for 43 Winchester cartridges. Winchester product pages
    don't publish MV. Data sourced from retailers (AbleAmmo, CheaperThanDirt, PSA,
    Optics Planet, Target Sports USA, BlackBasin, AmmoJoy, etc.) and Winchester
    ballistic charts distributed via Able Ammo. All values cross-referenced against
    2+ independent sources. Barrel lengths use SAAMI standards (24" rifle, 16" BLK).
operations:

# ── .22-250 Remington ────────────────────────────────────────────────────────
- action: update_cartridge
  manufacturer: Winchester
  name: "22-250 Remington, 64 Grain Power-Point"
  set:
    muzzle_velocity_fps: 3500
    test_barrel_length_inches: 24

