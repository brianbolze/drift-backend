patch:
  id: 017_norma_url_fixes
  author: agent
  date: '2026-03-19'
  description: >
    Fix source URLs on Norma cartridges from patch 016 — original URLs used
    fabricated slugs that 404. Updated to real norma-ammunition.com en-gb product
    page URLs with SKU numbers. Also fixes .300 Norma Mag cartridge: product_line
    was incorrectly "Golden Target", should be "Hybrid Target" (separate Norma
    product line).
operations:

# ── Fix .300 Norma Mag product_line + name + URL ────────────────────────────
- action: update_cartridge
  name: Norma Golden Target .300 Norma Mag 230gr Berger Hybrid Target
  manufacturer: Norma
  set:
    product_line: Hybrid Target
    source_url: https://www.norma-ammunition.com/en-gb/products/dedicated-precision/centerfire-rifle/norma-hybrid-target/norma-hybrid-target-300-norma-mag-230gr---20174602

