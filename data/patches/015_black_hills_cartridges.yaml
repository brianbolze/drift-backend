patch:
  id: 015_black_hills_cartridges
  author: agent
  date: '2026-03-18'
  description: >
    Add Black Hills Ammunition factory rifle cartridges. Data sourced from
    black-hills.com product pages. Covers .308 Win (12 loads), .223 Rem (15 loads),
    6.5 Creedmoor (4 loads), .338 Lapua Mag (2 loads), .300 Win Mag (1 load).
operations:
