  name: Black Hills Gold .308 Win 125gr Hornady CX
  caliber: .308 Winchester
  bullet: 30 Cal 308 125 gr ECX™
  bullet_manufacturer: Hornady
  bullet_weight_grains: 125.0
  muzzle_velocity_fps: 3000
  test_barrel_length_inches: 24.0
