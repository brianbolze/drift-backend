  # ── Oryx: soft_point, flat_base, hunting ────────────────────────────────────
  # Source: norma-ammunition.com — bonded semi-protected soft point, flat base

  - action: update_bullet
    manufacturer: Norma
    name: "Norma Oryx 5,7mm (.224) 3,6g"
    set: {tip_type: soft_point, base_type: flat_base, type_tags: '["hunting"]', used_for: '["hunting_varmint"]'}

  - action: update_bullet
    manufacturer: Norma
    name: "Norma Oryx 6mm (.243) 6,5g"
    set: {tip_type: soft_point, base_type: flat_base, type_tags: '["hunting"]', used_for: '["hunting_deer"]'}

