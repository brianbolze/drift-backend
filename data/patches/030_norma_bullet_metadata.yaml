patch:
  id: "030_norma_bullet_metadata"
  author: agent
  date: "2026-03-29"
  description: >
    Enrich tip_type, base_type, type_tags, used_for on 49 Norma bullets across 8
    product lines. Also fixes 2 invalid tip_type values ("polymer" → "polymer_tip")
    and corrects Diamond Line tip_type from polymer_tip to hollow_point. Values verified
    against norma-ammunition.com product pages.

