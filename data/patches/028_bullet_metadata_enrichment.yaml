  # ── Hornady bullets ─────────────────────────────────────────────────────────

  - action: update_bullet
    manufacturer: Hornady
    name: "17 Cal .172 17 gr V-MAX"
    set:
      tip_type: polymer_tip
      base_type: flat_base
      type_tags: '["varmint"]'
      used_for: '["hunting_varmint"]'

  - action: update_bullet
    manufacturer: Hornady
    name: "22 Cal .224 30 gr V-MAX"
