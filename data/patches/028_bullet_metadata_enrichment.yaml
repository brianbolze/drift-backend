patch:
  id: "028_bullet_metadata_enrichment"
  author: agent
  date: "2026-03-29"
  description: >
    Enrich tip_type, base_type, type_tags, used_for on 41 manually-curated bullets
    (Hornady 17, Berger 7, Sierra 5, Barnes 2, Federal 2, Winchester 17) plus fix
    invalid enum values on 4 existing records. Also sets product_line on 8 Black Hills
    standard-line cartridges. All values verified against manufacturer product pages
    or derived from unambiguous product naming conventions.

