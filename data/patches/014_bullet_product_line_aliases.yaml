    manufacturer: Barnes Bullets
    alias: TACTX
    alias_type: abbreviation

  # ── Lapua ────────────────────────────────────────────────────────────────
  - action: add_entity_alias
    entity_type: bullet_product_line
    entity_name: Scenar-L
    manufacturer: Lapua
    alias: Scenar L
    alias_type: alternate_name

  # ── Federal ──────────────────────────────────────────────────────────────
  - action: add_entity_alias
    entity_type: bullet_product_line
    entity_name: Trophy Bonded Bear Claw
    manufacturer: Federal
    alias: TBBC
    alias_type: abbreviation

  - action: add_entity_alias
    entity_type: bullet_product_line
    entity_name: Trophy Bonded Tip
    manufacturer: Federal
    alias: TBT
    alias_type: abbreviation

  # ── Nosler (additional) ─────────────────────────────────────────────────
  - action: add_entity_alias
    entity_type: bullet_product_line
    entity_name: Expansion Tip Lead Free
    manufacturer: Nosler
    alias: E-Tip
    alias_type: alternate_name
